<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Meal Recipe App - Search and discover delicious recipes">
    <title>Gourmet Recipe Collection</title>
    <link rel="shortcut icon" href="./assets/images/icon.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
    <div id="loaderScreen" class="loader-screen">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-3">Loading meals...</p>
    </div>

    <div id="mainContent">
        <header class="text-white py-4 mb-5">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <h1 class="mb-0"><i class="fas fa-utensils me-2"></i>Gourmet Recipe Collection</h1>
                        <p class="mb-0 mt-2 opacity-75" style="font-size: 0.9rem;">Discover exquisite recipes from around the world</p>
                    </div>
                    <div class="col-md-4 text-end d-flex justify-content-end align-items-center gap-2">
                        <button class="btn btn-light" id="showFavoritesBtn" title="Show Favorites">
                            <i class="fas fa-heart"></i>
                        </button>
                        <button class="btn btn-light" id="darkModeToggle" title="Toggle Dark Mode">
                            <i class="fas fa-moon" id="darkModeIcon"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <section class="sreach-bar mb-5">
            <div class="container">
                <div class="card">
                    <div class="card-body">
                        <h2 class="card-title"><i class="fas fa-search me-2"></i>Find Your Perfect Recipe</h2>
                        <form id="searchForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <input type="text" class="form-control form-control-lg" id="searchInput" placeholder="Search by meal name..." autocomplete="off">
                                </div>
                                <div class="col-md-2">
                                    <select class="form-select form-select-lg" id="areaFilter">
                                        <option value="">🌍 All Regions</option>
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <select class="form-select form-select-lg" id="categoryFilter">
                                        <option value="">🍲 All Categories</option>
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <button type="submit" class="btn btn-primary btn-lg w-100">
                                        <i class="fas fa-search me-2"></i>Search
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <section id="meals-wrapper">
            <div class="container">
                <div id="collectionHeader">
                    <h2><i class="fas fa-utensils me-2"></i>Our Menu Collection</h2>
                </div>
                <div id="mealsContainer" class="row g-4">
                </div>
                <div class="text-center mt-5">
                    <button class="btn btn-primary btn-lg" id="loadMoreBtn" onclick="loadMoreMeals( )">
                        <i class="fas fa-plus me-2"></i>Load More Recipes
                    </button>
                </div>
            </div>
        </section>

        <footer class="py-4 mt-5">
            <div class="container text-center">
            </div>
        </footer>
    </div>

    <div id="mealDetailsPage" class="d-none">
        <div class="container py-5">
            <button class="btn btn-secondary mb-4" id="backButton">
                <i class="fas fa-arrow-left me-2"></i>Back to Meals
            </button>
            <div id="mealDetailsContent">
            </div>
        </div>
    </div>

    <script src="./assets/js/meals-main.js"></script>
</body>

</html>
